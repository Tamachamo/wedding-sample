<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【Sample】世界に一つのWEB招待状</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body { 
      margin: 0; 
      overflow-x: hidden; 
      /* 👇 ここ！ 同じフォルダにある「wedding-bg.png」を読み込む設定やに！ */
      background-image: url('./wedding-bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Noto Serif JP', serif; /* 上品な明朝体 */
    }

    /* 全体をふんわり明るくするオーバーレイ */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,240,245,0.6));
      z-index: 0;
    }

    /* エレガントなガラス風カード（グラスモーフィズム） */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    /* アニメーション */
    @keyframes popIn { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .animate-pop-in { animation: popIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    /* 舞い散る光の粒子 */
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }
    .particle {
      position: absolute;
      bottom: -10%;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: floatUp linear infinite;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      z-index: 1;
    }
  </style>
</head>
<body class="text-gray-800 antialiased min-h-screen relative flex items-center justify-center p-4">

  <div class="bg-overlay"></div>

  <div id="particles-container" class="absolute inset-0 overflow-hidden pointer-events-none z-10"></div>

  <div class="glass-card relative z-20 p-8 md:p-14 rounded-3xl max-w-lg w-full animate-pop-in text-center border-t-4 border-amber-300">
    
    <div class="mb-8">
      <p class="text-amber-600 tracking-[0.3em] text-sm font-bold uppercase mb-2" style="font-family: 'Cormorant Garamond', serif;">Save the Date</p>
      <h1 class="text-3xl md:text-4xl font-bold text-gray-800 tracking-widest">
        Yuki & Haruka
      </h1>
      <p class="text-gray-400 text-sm mt-2 italic" style="font-family: 'Cormorant Garamond', serif;">We are getting married</p>
    </div>

    <div class="h-px w-16 bg-amber-300 mx-auto mb-8"></div>

    <h2 class="text-xl md:text-2xl font-bold mb-6 text-gray-800">
      大切なお友達の皆様へ
    </h2>
    
    <p class="text-md md:text-lg leading-loose text-gray-700 font-medium mb-10 text-left md:text-center">
      いつも温かい応援をありがとうございます。<br><br>
      この度、私たちは結婚式を挙げることになりました。<br>
      大好きな愛犬「マロン」と出会った、<br>
      思い出の海辺をテーマにしたささやかなパーティーです。<br><br>
      ぜひ皆様に日頃の感謝をお伝えしたく、<br>
      ご予定を空けておいていただけると嬉しいです！
    </p>

    <div class="bg-amber-50 rounded-xl p-6 mb-8 border border-amber-100">
      <p class="font-bold text-gray-800 mb-2">2026年 11月 22日 (日)</p>
      <p class="text-sm text-gray-600">アニヴェルセル みなとみらい横浜<br>14:00 受付開始 / 15:00 開宴</p>
    </div>

    <a href="#" class="inline-block bg-gray-800 text-white font-bold tracking-widest py-4 px-10 rounded-full hover:bg-amber-600 transition-colors duration-300 shadow-lg mb-4">
      出欠フォームへ進む <i class="fa-solid fa-angle-right ml-2"></i>
    </a>
    <p class="text-xs text-gray-400 mt-2">※期日：10月10日までにご回答をお願いします</p>

  </div>

  <script>
    // 背景に舞う光の粒子を生成するスクリプト
    const container = document.getElementById('particles-container');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      
      const size = Math.random() * 6 + 2; // 2px ~ 8px
      const left = Math.random() * 100; // 0% ~ 100%
      const delay = Math.random() * 5; // 0s ~ 5s
      const duration = Math.random() * 8 + 7; // 7s ~ 15s

      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${left}%`;
      particle.style.animationDelay = `${delay}s`;
      particle.style.animationDuration = `${duration}s`;

      container.appendChild(particle);
    }
  </script>
</body>
</html>
